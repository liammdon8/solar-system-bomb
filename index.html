<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Solar System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #info {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            user-select: none;
            z-index: 100;
        }

        #time-display {
            font-size: 14px;
            font-weight: bold;
        }

        /* UI 浮层 */
        #ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #ui-layer.hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        #ui-layer > * {
            pointer-events: auto;
        }
        #ui-layer > #info {
            pointer-events: none;
        }

        /* 侧边导航栏 - 磨砂玻璃 */
        #sidebar {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 4px;
            border-radius: 15px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 14px;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .nav-btn.active {
            background: white;
            color: black;
            font-weight: bold;
        }

        .nav-btn.moon {
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-btn.active.moon {
            color: black;
        }

        /* 底部速度控制 - 全宽胶囊 */
        #speed-controls {
            position: absolute;
            bottom: 30px;
            left: 16px;
            right: 16px;
            height: 60px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0 4px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .speed-btn {
            flex: 1;
            height: 52px;
            background: transparent;
            border: none;
            color: white;
            border-radius: 26px;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
            line-height: 52px;
        }

        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .speed-btn.active {
            background: white;
            color: black;
            font-weight: bold;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            #time-display { font-size: 12px; }
            #sidebar {
                right: 8px;
                padding: 3px;
                gap: 3px;
            }
            .nav-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
            #speed-controls {
                left: 10px;
                right: 10px;
                height: 50px;
                bottom: 20px;
            }
            .speed-btn {
                height: 42px;
                line-height: 42px;
                font-size: 12px;
                border-radius: 21px;
            }
            #ee-webcam-container {
                width: 140px;
                height: 105px;
            }
        }

        /* Easter Egg 摄像头预览 */
        #ee-webcam-container {
            display: none;
            position: fixed;
            left: 16px;
            bottom: 90px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 200;
        }
        #ee-webcam-container.active {
            display: block;
        }
        #ee-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #ee-canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        #ee-status {
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="info">
            <div id="time-display">模拟时间: 0 地球年 0 月</div>
        </div>

        <div id="sidebar"></div>

        <div id="speed-controls">
            <button class="speed-btn" data-speed="0.000694">1分/秒</button>
            <button class="speed-btn" data-speed="0.041667">1时/秒</button>
            <button class="speed-btn" data-speed="1">1天/秒</button>
            <button class="speed-btn active" data-speed="30">1月/秒</button>
            <button class="speed-btn" data-speed="365">1年/秒</button>
        </div>
    </div>

    <!-- Easter Egg: 手势控制摄像头预览 -->
    <div id="ee-webcam-container">
        <video id="ee-video" autoplay playsinline></video>
        <canvas id="ee-canvas-overlay"></canvas>
        <div id="ee-status">HAND TRACKING</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 常量与配置 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const AU_SCALE = 20;
        const SIZE_SCALE = 0.8;
        let timeScale = 30;

        const NAME_MAP = {
            Sun: '太阳', Mercury: '水星', Venus: '金星', Earth: '地球',
            Mars: '火星', Jupiter: '木星', Saturn: '土星', Uranus: '天王星',
            Neptune: '海王星', Moon: '月球'
        };

        const PLANETS_DATA = [
            {
                name: 'Mercury', radius: 0.38, distance: 0.39, period_rev: 88, period_rot: 58.6,
                eccentricity: 0.2056, inclination: 7.00, axialTilt: 0.03,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/9/92/Solarsystemscope_texture_2k_mercury.jpg',
                bumpMap: 'https://upload.wikimedia.org/wikipedia/commons/9/92/Solarsystemscope_texture_2k_mercury.jpg',
                fallbackColor: 0xA9A9A9
            },
            {
                name: 'Venus', radius: 0.95, distance: 0.72, period_rev: 225, period_rot: -243,
                eccentricity: 0.0067, inclination: 3.39, axialTilt: 177.36,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/4/40/Solarsystemscope_texture_2k_venus_surface.jpg',
                atmosphere: 'https://upload.wikimedia.org/wikipedia/commons/6/63/Solarsystemscope_texture_2k_venus_atmosphere.jpg',
                fallbackColor: 0xE3BB76
            },
            {
                name: 'Earth', radius: 1.0, distance: 1.0, period_rev: 365, period_rot: 1,
                eccentricity: 0.0167, inclination: 0.00, axialTilt: 23.44,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/0/04/Solarsystemscope_texture_8k_earth_daymap.jpg',
                nightMap: 'https://upload.wikimedia.org/wikipedia/commons/b/b3/Solarsystemscope_texture_8k_earth_nightmap.jpg',
                bumpMap: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_normal_2048.jpg',
                specularMap: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_specular_2048.jpg',
                clouds: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_clouds_1024.png',
                fallbackColor: 0x2233FF,
                hasMoon: true
            },
            {
                name: 'Mars', radius: 0.53, distance: 1.52, period_rev: 687, period_rot: 1.03,
                eccentricity: 0.0934, inclination: 1.85, axialTilt: 25.19,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/4/46/Solarsystemscope_texture_2k_mars.jpg',
                bumpMap: 'https://upload.wikimedia.org/wikipedia/commons/4/46/Solarsystemscope_texture_2k_mars.jpg',
                fallbackColor: 0xBC2732
            },
            {
                name: 'Jupiter', radius: 11.2, distance: 5.2, period_rev: 4332, period_rot: 0.41,
                eccentricity: 0.0489, inclination: 1.31, axialTilt: 3.13,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/b/be/Solarsystemscope_texture_2k_jupiter.jpg',
                fallbackColor: 0xC99039
            },
            {
                name: 'Saturn', radius: 9.45, distance: 9.54, period_rev: 10760, period_rot: 0.45,
                eccentricity: 0.0565, inclination: 2.49, axialTilt: 26.73,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/e/ea/Solarsystemscope_texture_2k_saturn.jpg',
                ringTexture: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/saturn_ring.png',
                fallbackColor: 0xEAD6B8,
                hasRing: true
            },
            {
                name: 'Uranus', radius: 4.0, distance: 19.2, period_rev: 30687, period_rot: -0.72,
                eccentricity: 0.046, inclination: 0.77, axialTilt: 97.77,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/9/95/Solarsystemscope_texture_2k_uranus.jpg',
                ringTexture: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Uranus_ring.png/800px-Uranus_ring.png',
                fallbackColor: 0xD1E7E7
            },
            {
                name: 'Neptune', radius: 3.88, distance: 30.1, period_rev: 60190, period_rot: 0.67,
                eccentricity: 0.0097, inclination: 1.77, axialTilt: 28.32,
                texture: 'https://upload.wikimedia.org/wikipedia/commons/1/1e/Solarsystemscope_texture_2k_neptune.jpg',
                fallbackColor: 0x5B5DDF
            }
        ];

        // --- 场景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 150, 300);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 纹理加载 ---
        const loadingManager = new THREE.LoadingManager();
        const textureLoader = new THREE.TextureLoader(loadingManager);
        textureLoader.setCrossOrigin('anonymous');
        loadingManager.onError = (url) => console.warn('纹理加载失败:', url);

        // --- 球坐标相机控制 ---
        const spherical = { theta: 0, phi: Math.PI / 3, radius: 350 };
        const controlsTarget = new THREE.Vector3(0, 0, 0);
        let dampingTheta = 0;
        let dampingPhi = 0;

        function updateCameraFromSpherical() {
            const s = spherical;
            const t = controlsTarget;
            camera.position.set(
                t.x + s.radius * Math.sin(s.phi) * Math.sin(s.theta),
                t.y + s.radius * Math.cos(s.phi),
                t.z + s.radius * Math.sin(s.phi) * Math.cos(s.theta)
            );
            camera.lookAt(t);
        }
        updateCameraFromSpherical();

        // --- 标签集合（用于动态缩放） ---
        const allLabels = [];

        function createLabel(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            context.font = 'Bold 48px Arial';
            context.fillStyle = 'white';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.shadowColor = 'black';
            context.shadowBlur = 4;
            context.fillText(text, 128, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(4, 2, 1);
            sprite.renderOrder = 999;
            sprite.userData.baseScale = 4;
            allLabels.push(sprite);
            return sprite;
        }

        // --- 太阳 ---
        const sunSegments = isMobile ? 64 : 128;
        const sunGeometry = new THREE.SphereGeometry(5, sunSegments, sunSegments);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

        textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/c/cb/Solarsystemscope_texture_2k_sun.jpg',
            (texture) => { sunMaterial.map = texture; sunMaterial.needsUpdate = true; },
            undefined,
            () => { sunMaterial.color.setHex(0xfdb813); }
        );

        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.name = 'Sun';

        // 日冕
        function createSunGlow() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.2, 'rgba(255,230,0,0.8)');
            g.addColorStop(0.45, 'rgba(255,100,0,0.5)');
            g.addColorStop(0.7, 'rgba(150,20,0,0.1)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 256, 256);
            return new THREE.CanvasTexture(canvas);
        }

        const glowMat = new THREE.SpriteMaterial({
            map: createSunGlow(), color: 0xffffff, transparent: true,
            blending: THREE.AdditiveBlending, depthWrite: false
        });
        const sunGlow = new THREE.Sprite(glowMat);
        sunGlow.scale.set(18, 18, 1);
        sun.add(sunGlow);

        const sunLabel = createLabel(NAME_MAP['Sun']);
        sunLabel.position.set(0, 8, 0);
        sun.add(sunLabel);

        const sunLight = new THREE.PointLight(0xffffff, 2.5, 0, 0);
        sun.add(sunLight);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x333333));

        // --- 深空背景：ESO 银河全景球 + 前景视差星粒子 ---

        // 1. 全景星空球（含银河带+星云，ESO/S. Brunier CC BY 4.0）
        const skyGeo = new THREE.SphereGeometry(5000, 64, 32);
        const skyMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0x000000 });
        const skySphere = new THREE.Mesh(skyGeo, skyMat);
        scene.add(skySphere);

        // 加载全景贴图（主 ESO 6k 银河，备用 Flickr 5k 星空）
        textureLoader.load(
            'https://www.eso.org/public/archives/images/large/eso0932a.jpg',
            (tex) => {
                tex.colorSpace = THREE.SRGBColorSpace;
                skyMat.map = tex;
                skyMat.color.setHex(0xffffff);
                skyMat.needsUpdate = true;
            },
            undefined,
            () => {
                // ESO 加载失败，尝试备用
                textureLoader.load(
                    'https://live.staticflickr.com/2347/2294472375_24a3b8ef46_o.jpg',
                    (tex2) => {
                        tex2.colorSpace = THREE.SRGBColorSpace;
                        skyMat.map = tex2;
                        skyMat.color.setHex(0xffffff);
                        skyMat.needsUpdate = true;
                    }
                );
            }
        );

        // 2. 前景视差亮星粒子（缩放时产生深度感）
        {
            const count = 400;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 800 + Math.random() * 1200; // 分布在 800-2000 范围
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
                color: 0xffffff, size: 1.2, sizeAttenuation: true
            })));
        }

        // --- 行星生成 ---
        const planetMeshes = [];
        const interactableMeshes = [];
        const orbitLines = [];

        PLANETS_DATA.forEach(data => {
            const orbitContainer = new THREE.Object3D();
            orbitContainer.rotation.x = THREE.MathUtils.degToRad(data.inclination);
            scene.add(orbitContainer);

            const a = data.distance * AU_SCALE;
            const e = data.eccentricity;
            const b = a * Math.sqrt(1 - e * e);
            const c = a * e;

            // 轨道线
            const curve = new THREE.EllipseCurve(-c, 0, a, b, 0, 2*Math.PI, false, 0);
            const points = curve.getPoints(128);
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(points);
            const orbitMat = new THREE.LineBasicMaterial({
                color: 0x666666, transparent: true, opacity: 0.25
            });
            const orbitLine = new THREE.LineLoop(orbitGeo, orbitMat);
            orbitLine.rotation.x = -Math.PI / 2;
            orbitContainer.add(orbitLine);
            orbitLines.push(orbitLine);

            // 行星组
            const planetGroup = new THREE.Group();
            planetGroup.name = data.name + '_Group';
            orbitContainer.add(planetGroup);

            // 轴倾斜容器
            const tiltContainer = new THREE.Object3D();
            tiltContainer.rotation.z = THREE.MathUtils.degToRad(data.axialTilt || 0);
            planetGroup.add(tiltContainer);

            // 行星本体
            const segments = isMobile ? (data.name === 'Earth' ? 48 : 24) : 64;
            const pRadius = data.radius * SIZE_SCALE;
            const geo = new THREE.SphereGeometry(pRadius, segments, segments);
            let mat;

            if (data.nightMap) {
                // 地球专用：日夜混合 shader + normalMap
                mat = new THREE.ShaderMaterial({
                    uniforms: {
                        dayMap: { value: null },
                        nightMap: { value: null },
                        sunPosition: { value: new THREE.Vector3(0, 0, 0) }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying vec3 vWorldNormal;
                        varying vec3 vWorldPosition;
                        void main() {
                            vUv = uv;
                            // 世界空间法线（用 modelMatrix 的 3x3 部分）
                            vWorldNormal = normalize(mat3(modelMatrix) * normal);
                            vec4 wp = modelMatrix * vec4(position, 1.0);
                            vWorldPosition = wp.xyz;
                            gl_Position = projectionMatrix * viewMatrix * wp;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D dayMap;
                        uniform sampler2D nightMap;
                        uniform vec3 sunPosition;
                        varying vec2 vUv;
                        varying vec3 vWorldNormal;
                        varying vec3 vWorldPosition;
                        void main() {
                            vec3 lightDir = normalize(sunPosition - vWorldPosition);
                            float NdotL = dot(normalize(vWorldNormal), lightDir);
                            // 平滑晨昏线过渡：-0.15 ~ 0.25
                            float blend = smoothstep(-0.15, 0.25, NdotL);

                            vec4 dayColor = texture2D(dayMap, vUv);
                            vec4 nightColor = texture2D(nightMap, vUv);

                            // 白天：漫反射光照；夜面：城市灯光自发光
                            vec3 lit = dayColor.rgb * (0.1 + 0.9 * max(NdotL, 0.0));
                            vec3 night = nightColor.rgb * 1.5;
                            vec3 color = mix(night, lit, blend);
                            gl_FragColor = vec4(color, 1.0);
                        }
                    `
                });
                // 加载日照图（8k）
                textureLoader.load(data.texture, (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;
                    mat.uniforms.dayMap.value = tex;
                    mat.needsUpdate = true;
                });
                // 加载夜景灯光图（8k）
                textureLoader.load(data.nightMap, (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;
                    mat.uniforms.nightMap.value = tex;
                    mat.needsUpdate = true;
                });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    color: data.fallbackColor, roughness: 0.8, metalness: 0.1
                });

                textureLoader.load(data.texture, (tex) => {
                    mat.map = tex; mat.color.setHex(0xffffff); mat.needsUpdate = true;
                });

                if (data.bumpMap) {
                    textureLoader.load(data.bumpMap, (bumpTex) => {
                        mat.bumpMap = bumpTex;
                        mat.bumpScale = 0.05 * pRadius;
                        mat.needsUpdate = true;
                    });
                }

                if (data.specularMap) {
                    textureLoader.load(data.specularMap, (specTex) => {
                        mat.roughnessMap = specTex; mat.roughness = 0.5; mat.needsUpdate = true;
                    });
                }
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.name = data.name;
            tiltContainer.add(mesh);
            interactableMeshes.push(mesh);

            // 存储地球材质引用，用于每帧更新 sunPosition
            if (data.nightMap) {
                mesh.userData.earthShaderMat = mat;
            }

            // 云层
            if (data.clouds) {
                const cloudGeo = new THREE.SphereGeometry(pRadius * 1.01, segments, segments);
                const cloudMat = new THREE.MeshPhongMaterial({
                    transparent: true, opacity: 0.8,
                    blending: THREE.AdditiveBlending, side: THREE.DoubleSide
                });
                textureLoader.load(data.clouds, (cloudTex) => {
                    cloudMat.map = cloudTex; cloudMat.needsUpdate = true;
                });
                const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
                mesh.add(cloudMesh);
                planetGroup.userData.cloudMesh = cloudMesh;
            }

            // 大气层着色器
            if (data.name === 'Earth' || data.name === 'Venus') {
                const atmosGeo = new THREE.SphereGeometry(pRadius * 1.02, 32, 32);
                const atmosMat = new THREE.ShaderMaterial({
                    uniforms: {
                        c: { value: 1.0 }, p: { value: 1.8 },
                        glowColor: { value: new THREE.Color(data.name === 'Earth' ? 0x87ceeb : 0xffd89b) },
                        viewVector: { value: camera.position }
                    },
                    vertexShader: `
                        uniform vec3 viewVector; uniform float c; uniform float p;
                        varying float intensity;
                        void main() {
                            vec3 vNormal = normalize(normalMatrix * normal);
                            vec3 vNormel = normalize(normalMatrix * viewVector);
                            intensity = pow(c - dot(vNormal, vNormel), p);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }`,
                    fragmentShader: `
                        uniform vec3 glowColor; varying float intensity;
                        void main() {
                            vec3 glow = glowColor * intensity;
                            gl_FragColor = vec4(glow, 1.0);
                        }`,
                    side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true
                });
                mesh.add(new THREE.Mesh(atmosGeo, atmosMat));
            }

            // 土星/天王星环
            if ((data.hasRing || data.name === 'Uranus') && data.ringTexture) {
                const ringInner = data.name === 'Saturn' ? 1.4 : 1.5;
                const ringOuter = data.name === 'Saturn' ? 2.5 : 2.2;
                const ringGeo = new THREE.RingGeometry(pRadius * ringInner, pRadius * ringOuter, 64);
                const pos = ringGeo.attributes.position;
                const v3 = new THREE.Vector3();
                for (let i = 0; i < pos.count; i++) {
                    v3.fromBufferAttribute(pos, i);
                    ringGeo.attributes.uv.setXY(i, (v3.length() - pRadius*ringInner) / (pRadius*(ringOuter-ringInner)), 0.5);
                }
                const ringMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8
                });
                textureLoader.load(data.ringTexture, (tex) => {
                    tex.rotation = Math.PI / 2; tex.center.set(0.5, 0.5);
                    ringMat.map = tex; ringMat.needsUpdate = true;
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                tiltContainer.add(ring);
            }

            // 标签（中文）
            const label = createLabel(NAME_MAP[data.name] || data.name);
            label.position.set(0, pRadius + (data.name === 'Saturn' ? 3 : 1.5), 0);
            mesh.add(label);

            // 数据绑定
            const initialMeanAnomaly = Math.random() * Math.PI * 2;
            planetGroup.userData = Object.assign(planetGroup.userData || {}, {
                a, e, period_rev: data.period_rev, period_rot: data.period_rot,
                meanAnomaly: initialMeanAnomaly, orbitContainer, mesh, tiltContainer
            });

            // 月球
            if (data.hasMoon) {
                const moonDist = pRadius * 6;
                const moonR = pRadius * 0.27;

                const moonOrbitContainer = new THREE.Object3D();
                moonOrbitContainer.rotation.x = THREE.MathUtils.degToRad(5.145);
                planetGroup.add(moonOrbitContainer);

                const moonGroup = new THREE.Group();
                moonOrbitContainer.add(moonGroup);

                const mGeo = new THREE.SphereGeometry(moonR, 24, 24);
                const mMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 });
                textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/2/26/Solarsystemscope_texture_2k_moon.jpg', (tex) => {
                    mMat.map = tex; mMat.needsUpdate = true;
                });
                const moon = new THREE.Mesh(mGeo, mMat);
                moon.name = 'Moon';
                moonGroup.add(moon);
                interactableMeshes.push(moon);

                moonGroup.userData = {
                    distance: moonDist, period_rev: 27.3, period_rot: 27.3,
                    angle: Math.random() * Math.PI * 2, mesh: moon
                };
                planetGroup.userData.moonGroup = moonGroup;

                const mLabel = createLabel(NAME_MAP['Moon']);
                mLabel.scale.set(2, 1, 1);
                mLabel.userData.baseScale = 2;
                mLabel.position.set(0, moonR + 0.5, 0);
                moon.add(mLabel);

                // 月球轨道线
                const mCurve = new THREE.EllipseCurve(0, 0, moonDist, moonDist, 0, 2*Math.PI, false, 0);
                const mPoints = mCurve.getPoints(64);
                const mOrbitGeo = new THREE.BufferGeometry().setFromPoints(mPoints);
                const mOrbitLine = new THREE.LineLoop(mOrbitGeo, new THREE.LineBasicMaterial({
                    color: 0x666666, transparent: true, opacity: 0.25
                }));
                mOrbitLine.rotation.x = -Math.PI / 2;
                moonOrbitContainer.add(mOrbitLine);
                orbitLines.push(mOrbitLine);
            }

            planetMeshes.push(planetGroup);
        });

        // --- 触控/鼠标交互 ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let focusTarget = null;
        let needsZoom = false;
        let activeBtnTimer = null;

        // 动态最小距离：聚焦天体时基于半径，否则全局默认
        function getMinRadius() {
            if (focusTarget && focusTarget.geometry && focusTarget.geometry.parameters) {
                const r = focusTarget.geometry.parameters.radius;
                // 地球用 8k 贴图，允许更贴近观赏纹理
                if (focusTarget.name === 'Earth') return r * 1.2;
                return r * 1.5;
            }
            return 5; // 全局默认（不聚焦时）
        }

        function clampRadius() {
            spherical.radius = Math.max(getMinRadius(), Math.min(1500, spherical.radius));
        }

        // 触控状态
        let touchStart = null;
        let pinchStart = 0;
        let isRotating = false;
        let hasMoved = false;

        // 鼠标状态
        let mouseDown = false;
        let mouseStart = { x: 0, y: 0 };

        // 点击检测（双击切换UI / 三击彩蛋 / 单击射线）
        let lastTapTime = 0;
        let tapTimer = null;
        let clickCount = 0;
        let clickTimer = null;
        let uiVisible = true;
        let lastInputWasTouch = false; // 防止 touch→mouse 双重触发

        function toggleUI() {
            uiVisible = !uiVisible;
            document.getElementById('ui-layer').classList.toggle('hidden');
            // 同步轨道线和标签可见性
            orbitLines.forEach(line => line.visible = uiVisible);
            allLabels.forEach(label => label.visible = uiVisible);
        }

        function touchDist(t0, t1) {
            const dx = t0.clientX - t1.clientX, dy = t0.clientY - t1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Touch events
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.target.closest('#ui-layer')) return;
            lastInputWasTouch = true;
            hasMoved = false;
            if (e.touches.length === 1) {
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                isRotating = true;
                dampingTheta = 0;
                dampingPhi = 0;
            } else if (e.touches.length === 2) {
                pinchStart = touchDist(e.touches[0], e.touches[1]);
                isRotating = false;
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isRotating && e.touches.length === 1) {
                const dx = e.touches[0].clientX - touchStart.x;
                const dy = e.touches[0].clientY - touchStart.y;
                // 超过 5px 才算真正移动（过滤手指抖动）
                if (!hasMoved && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
                hasMoved = true;
                spherical.theta -= dx * 0.01;
                spherical.phi -= dy * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                dampingTheta = -dx * 0.002;
                dampingPhi = -dy * 0.002;
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                updateCameraFromSpherical();
            } else if (e.touches.length === 2) {
                hasMoved = true;
                const cur = touchDist(e.touches[0], e.touches[1]);
                const scale = pinchStart / cur;
                spherical.radius *= scale;
                clampRadius();
                pinchStart = cur;
                updateCameraFromSpherical();
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchend', (e) => {
            isRotating = false;
            if (!hasMoved && e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                const cx = touch.clientX, cy = touch.clientY;
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount >= 3) {
                        toggleEasterEgg();
                    } else if (clickCount === 2) {
                        toggleUI();
                    } else if (clickCount === 1) {
                        doRaycast(cx, cy);
                    }
                    clickCount = 0;
                }, 400);
            }
        });

        // Mouse events (skip if touch was recent to prevent ghost events)
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (lastInputWasTouch) return;
            mouseDown = true;
            mouseStart = { x: e.clientX, y: e.clientY };
            hasMoved = false;
            dampingTheta = 0;
            dampingPhi = 0;
        });

        window.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            hasMoved = true;
            const dx = e.clientX - mouseStart.x;
            const dy = e.clientY - mouseStart.y;
            spherical.theta -= dx * 0.005;
            spherical.phi -= dy * 0.005;
            spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
            dampingTheta = -dx * 0.001;
            dampingPhi = -dy * 0.001;
            mouseStart = { x: e.clientX, y: e.clientY };
            updateCameraFromSpherical();
        });

        window.addEventListener('mouseup', (e) => {
            if (lastInputWasTouch) { lastInputWasTouch = false; return; }
            mouseDown = false;
            if (!hasMoved) {
                const cx = e.clientX, cy = e.clientY;
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount >= 3) {
                        toggleEasterEgg();
                    } else if (clickCount === 2) {
                        toggleUI();
                    } else if (clickCount === 1) {
                        doRaycast(cx, cy);
                    }
                    clickCount = 0;
                }, 400);
            }
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            spherical.radius *= (1 + e.deltaY * 0.001);
            clampRadius();
            updateCameraFromSpherical();
        }, { passive: false });

        function doRaycast(clientX, clientY) {
            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects([sun, ...interactableMeshes], false);
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.name === 'Sun') {
                    resetView();
                } else {
                    focusTarget = obj;
                    needsZoom = true;
                }
            }
        }

        // --- 速度控制 ---
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                timeScale = parseFloat(e.target.dataset.speed);
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });
            btn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        });

        // --- 侧边导航栏 ---
        const sidebar = document.getElementById('sidebar');

        function handleNavClick(mesh, btnElement) {
            if (!mesh) return;
            if (mesh.name === 'Sun') {
                resetView();
                return;
            }
            focusTarget = mesh;
            needsZoom = true;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
                if (activeBtnTimer) clearTimeout(activeBtnTimer);
                activeBtnTimer = setTimeout(() => btnElement.classList.remove('active'), 3000);
            }
        }

        // 太阳按钮
        const sunBtn = document.createElement('button');
        sunBtn.className = 'nav-btn';
        sunBtn.innerText = NAME_MAP['Sun'];
        sunBtn.onclick = () => handleNavClick(sun, sunBtn);
        sidebar.appendChild(sunBtn);

        // 行星+月球按钮
        PLANETS_DATA.forEach(data => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = NAME_MAP[data.name] || data.name;
            btn.onclick = () => {
                const targetMesh = interactableMeshes.find(m => m.name === data.name);
                handleNavClick(targetMesh, btn);
            };
            sidebar.appendChild(btn);

            if (data.hasMoon) {
                const moonBtn = document.createElement('button');
                moonBtn.className = 'nav-btn moon';
                moonBtn.innerText = NAME_MAP['Moon'];
                moonBtn.onclick = () => {
                    const moonMesh = interactableMeshes.find(m => m.name === 'Moon');
                    handleNavClick(moonMesh, moonBtn);
                };
                sidebar.appendChild(moonBtn);
            }
        });

        // --- 重置视角 ---
        function resetView() {
            spherical.theta = 0;
            spherical.phi = Math.PI / 3;
            spherical.radius = 350;
            controlsTarget.set(0, 0, 0);
            focusTarget = null;
            dampingTheta = 0;
            dampingPhi = 0;
            updateCameraFromSpherical();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        }

        // --- 动画循环 ---
        let previousTime = performance.now();
        let simulatedDays = 0;
        const timeDisplay = document.getElementById('time-display');

        function animate() {
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const dt = (currentTime - previousTime) / 1000;
            previousTime = currentTime;
            if (dt > 0.1) return;

            // 阻尼衰减
            if (Math.abs(dampingTheta) > 0.0001 || Math.abs(dampingPhi) > 0.0001) {
                spherical.theta += dampingTheta;
                spherical.phi += dampingPhi;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                dampingTheta *= 0.92;
                dampingPhi *= 0.92;
                updateCameraFromSpherical();
            }

            // === 彩蛋动画更新 ===
            if (eeActive) {
                updateParticleSystems(dt);
                if (eeState === 'DESTROYING') {
                    updateDestroyAnimation(dt);
                    // 焦点跟随仍然需要
                    if (focusTarget) {
                        const wp = new THREE.Vector3();
                        focusTarget.getWorldPosition(wp);
                        controlsTarget.lerp(wp, 0.05);
                        camera.lookAt(controlsTarget);
                    }
                    // 动态标签缩放
                    const camPos2 = camera.position;
                    allLabels.forEach(label => {
                        const wp = new THREE.Vector3();
                        label.getWorldPosition(wp);
                        const dist = camPos2.distanceTo(wp);
                        const base = label.userData.baseScale || 4;
                        const s = base * Math.max(0.3, Math.min(3, dist / 350));
                        label.scale.set(s, s / 2, 1);
                    });
                    renderer.render(scene, camera);
                    return;
                }
                if (eeState === 'DEAD') {
                    renderer.render(scene, camera);
                    return;
                }
                if (eeState === 'REBIRTHING') {
                    updateRebirthAnimation(dt);
                    // 焦点跟随
                    if (focusTarget) {
                        const wp = new THREE.Vector3();
                        focusTarget.getWorldPosition(wp);
                        controlsTarget.lerp(wp, 0.05);
                        camera.lookAt(controlsTarget);
                    }
                    // 动态标签缩放
                    const camPos3 = camera.position;
                    allLabels.forEach(label => {
                        const wp = new THREE.Vector3();
                        label.getWorldPosition(wp);
                        const dist = camPos3.distanceTo(wp);
                        const base = label.userData.baseScale || 4;
                        const s = base * Math.max(0.3, Math.min(3, dist / 350));
                        label.scale.set(s, s / 2, 1);
                    });
                    renderer.render(scene, camera);
                    return;
                }
            }

            // 焦点跟随
            if (focusTarget) {
                const wp = new THREE.Vector3();
                focusTarget.getWorldPosition(wp);
                controlsTarget.lerp(wp, 0.05);

                if (needsZoom) {
                    const tr = focusTarget.geometry.parameters.radius;
                    const zf = focusTarget.name === 'Moon' ? 5 : 4;
                    const ideal = tr * zf;
                    const cur = camera.position.distanceTo(wp);
                    const nd = cur + (ideal - cur) * 0.05;
                    const dir = new THREE.Vector3().subVectors(camera.position, wp).normalize();
                    camera.position.copy(wp.clone().add(dir.multiplyScalar(nd)));
                    spherical.radius = nd;
                    if (Math.abs(cur - ideal) < 0.5) needsZoom = false;
                }
                camera.lookAt(controlsTarget);
            }

            // 时间
            const deltaDays = dt * timeScale;
            simulatedDays += deltaDays;
            const years = Math.floor(simulatedDays / 365);
            const months = Math.floor((simulatedDays % 365) / 30);
            timeDisplay.innerText = `模拟时间: ${years} 地球年 ${months} 月`;

            // 太阳自转
            sun.rotation.y += dt * 0.05;

            // 更新地球日夜 shader 的太阳位置
            const sunWorldPos = new THREE.Vector3();
            sun.getWorldPosition(sunWorldPos);
            interactableMeshes.forEach(m => {
                if (m.userData.earthShaderMat) {
                    m.userData.earthShaderMat.uniforms.sunPosition.value.copy(sunWorldPos);
                }
            });

            // 行星运动
            planetMeshes.forEach(group => {
                const u = group.userData;
                if (!u.a) return;

                u.meanAnomaly += (deltaDays / u.period_rev) * Math.PI * 2;
                let E = u.meanAnomaly;
                const e = u.e;
                for (let i = 0; i < 5; i++) {
                    E = E - (E - e * Math.sin(E) - u.meanAnomaly) / (1 - e * Math.cos(E));
                }
                const a = u.a, b = a * Math.sqrt(1 - e * e);
                group.position.x = a * (Math.cos(E) - e);
                group.position.z = b * Math.sin(E);

                if (u.mesh) u.mesh.rotation.y += (deltaDays / u.period_rot) * Math.PI * 2;
                if (u.cloudMesh) u.cloudMesh.rotation.y += (deltaDays / u.period_rot) * Math.PI * 2 * 1.2;

                if (u.moonGroup) {
                    const mu = u.moonGroup.userData;
                    mu.angle += (deltaDays / mu.period_rev) * Math.PI * 2;
                    u.moonGroup.position.x = Math.cos(mu.angle) * mu.distance;
                    u.moonGroup.position.z = Math.sin(mu.angle) * mu.distance;
                    if (mu.mesh) mu.mesh.rotation.y += (deltaDays / mu.period_rot) * Math.PI * 2;
                }
            });

            // 动态标签缩放
            const camPos = camera.position;
            allLabels.forEach(label => {
                const wp = new THREE.Vector3();
                label.getWorldPosition(wp);
                const dist = camPos.distanceTo(wp);
                const base = label.userData.baseScale || 4;
                const s = base * Math.max(0.3, Math.min(3, dist / 350));
                label.scale.set(s, s / 2, 1);
            });

            // 动态银河亮度：近处减弱干扰，远处清晰
            // radius 50 以下 → 很暗(0.15)，350+ → 全亮(1.0)
            const skyBrightness = THREE.MathUtils.clamp((spherical.radius - 50) / 300, 0.15, 1.0);
            skyMat.color.setScalar(skyBrightness);

            renderer.render(scene, camera);
        }
        // ====================================================
        // === EASTER EGG: 手势控制系统 ===
        // ====================================================

        let eeActive = false;
        let eeState = 'NORMAL'; // NORMAL | DESTROYING | DEAD | REBIRTHING
        let easterEggLoading = false;
        let mpHands = null;
        let mpCamera = null;
        let mediaStream = null;
        const particleSystems = [];
        const gravitySystems = []; // 引力模拟粒子系统（重生用）
        let destroyTimer = 0;
        let rebirthTimer = 0;
        let dustBelt = null; // 冲击尘埃带（替代冲击波环）
        let savedTimeScale = 30;
        let savedStates = []; // 天体原始状态备份
        let gestureName = '';
        let gestureStartTime = 0;
        const GESTURE_DEBOUNCE = 200; // ms
        let lastHandCenter = null;

        // DOM 引用
        const eeContainer = document.getElementById('ee-webcam-container');
        const eeVideo = document.getElementById('ee-video');
        const eeCanvasOverlay = document.getElementById('ee-canvas-overlay');
        const eeStatus = document.getElementById('ee-status');
        const eeCanvasCtx = eeCanvasOverlay.getContext('2d');

        // --- MediaPipe 动态加载 ---
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = url;
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        async function loadMediaPipe() {
            if (window.Hands) return; // 已加载
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js');
        }

        // --- 三击切换 ---
        function toggleEasterEgg() {
            if (easterEggLoading) return;
            if (eeActive) {
                deactivateEasterEgg();
            } else {
                activateEasterEgg();
            }
        }

        // --- 激活彩蛋 ---
        async function activateEasterEgg() {
            easterEggLoading = true;
            eeStatus.textContent = 'LOADING...';
            eeContainer.classList.add('active');

            try {
                await loadMediaPipe();

                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 320, height: 240, facingMode: 'user' }
                });
                eeVideo.srcObject = mediaStream;
                await eeVideo.play();

                // 设置 overlay canvas 尺寸
                eeCanvasOverlay.width = eeVideo.videoWidth || 320;
                eeCanvasOverlay.height = eeVideo.videoHeight || 240;

                // 初始化 Hands
                mpHands = new window.Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
                });
                mpHands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 0,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.5
                });
                mpHands.onResults(onHandResults);

                // 启动帧循环
                mpCamera = new window.Camera(eeVideo, {
                    onFrame: async () => {
                        if (mpHands) await mpHands.send({ image: eeVideo });
                    },
                    width: 320,
                    height: 240
                });
                mpCamera.start();

                // 保存天体状态
                saveAllStates();

                eeActive = true;
                eeState = 'NORMAL';
                eeStatus.textContent = 'HAND TRACKING';
            } catch (err) {
                console.warn('Easter egg activation failed:', err);
                eeStatus.textContent = 'FAILED';
                setTimeout(() => eeContainer.classList.remove('active'), 1500);
            }
            easterEggLoading = false;
        }

        // --- 关闭彩蛋 ---
        function deactivateEasterEgg() {
            if (mpCamera) { mpCamera.stop(); mpCamera = null; }
            if (mpHands) { mpHands.close(); mpHands = null; }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            eeVideo.srcObject = null;

            // 清理粒子
            particleSystems.forEach(ps => {
                scene.remove(ps.points);
                ps.points.geometry.dispose();
                ps.points.material.dispose();
            });
            particleSystems.length = 0;

            // 清理引力粒子系统
            gravitySystems.forEach(gs => {
                scene.remove(gs.points);
                gs.points.geometry.dispose();
                gs.points.material.dispose();
            });
            gravitySystems.length = 0;

            // 清理尘埃带
            if (dustBelt) {
                scene.remove(dustBelt.points);
                dustBelt.points.geometry.dispose();
                dustBelt.points.material.dispose();
                dustBelt = null;
            }

            // 强制恢复天体
            if (eeState !== 'NORMAL') {
                restoreAllStates();
                skyMat.color.setScalar(1.0);
            }

            eeActive = false;
            eeState = 'NORMAL';
            lastHandCenter = null;
            gestureName = '';
            eeContainer.classList.remove('active');
        }

        // --- 保存/恢复天体状态 ---
        function saveAllStates() {
            savedStates = [];
            // 太阳
            savedStates.push({
                obj: sun, visible: sun.visible,
                scale: sun.scale.clone(),
                glowOpacity: glowMat.opacity
            });
            // 行星组
            planetMeshes.forEach(group => {
                const u = group.userData;
                const state = {
                    group,
                    visible: u.mesh.visible,
                    meshScale: u.mesh.scale.clone(),
                    tiltVisible: u.tiltContainer.visible
                };
                savedStates.push(state);
            });
            savedTimeScale = timeScale;
        }

        function restoreAllStates() {
            // 太阳
            sun.visible = true;
            sun.scale.set(1, 1, 1);
            glowMat.opacity = 1;
            sunGlow.visible = true;

            // 行星
            planetMeshes.forEach(group => {
                const u = group.userData;
                u.mesh.visible = true;
                u.mesh.scale.set(1, 1, 1);
                u.tiltContainer.visible = true;
                if (u.moonGroup) {
                    u.moonGroup.userData.mesh.visible = true;
                    u.moonGroup.userData.mesh.scale.set(1, 1, 1);
                }
            });

            // 轨道线和标签
            orbitLines.forEach(l => l.visible = uiVisible);
            allLabels.forEach(l => l.visible = uiVisible);

            timeScale = savedTimeScale;
        }

        // --- 手势识别回调 ---
        function onHandResults(results) {
            // 绘制骨架
            eeCanvasCtx.clearRect(0, 0, eeCanvasOverlay.width, eeCanvasOverlay.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                // 绘制连接线和关键点
                if (window.drawConnectors && window.drawLandmarks) {
                    window.drawConnectors(eeCanvasCtx, landmarks, window.HAND_CONNECTIONS, {
                        color: 'rgba(0,255,255,0.5)', lineWidth: 1
                    });
                    window.drawLandmarks(eeCanvasCtx, landmarks, {
                        color: 'rgba(255,100,255,0.7)', lineWidth: 1, radius: 2
                    });
                }

                // 识别手势
                const gesture = classifyGesture(landmarks);
                processGesture(gesture, landmarks);
            } else {
                lastHandCenter = null;
                gestureName = '';
            }
        }

        // --- 手势分类 ---
        function classifyGesture(lm) {
            // 判断手指是否伸展：指尖 y < PIP 关节 y（归一化坐标 y 向下增大）
            const fingerTips = [8, 12, 16, 20]; // 食/中/无名/小指尖
            const fingerPIPs = [6, 10, 14, 18]; // 对应 PIP 关节
            let extended = 0;
            const extList = [];
            for (let i = 0; i < 4; i++) {
                if (lm[fingerTips[i]].y < lm[fingerPIPs[i]].y) {
                    extended++;
                    extList.push(i);
                }
            }
            // 拇指判断：拇指尖(4)离中指MCP(9)的 x 距离，阈值放宽
            const thumbExtended = Math.abs(lm[4].x - lm[9].x) > 0.12;
            if (thumbExtended) extended++;

            if (extended >= 4) return 'palm';
            if (extended === 0) return 'fist';
            // 放宽 point 判定：食指必须伸展，允许最多 1 根其他手指被误判
            if (extList.includes(0) && extended <= 2) return 'point';
            return 'other';
        }

        // --- 手势处理（含去抖和状态机） ---
        function processGesture(gesture, landmarks) {
            const now = performance.now();

            // 手掌中心 = 腕部(0) 和中指MCP(9) 的平均值
            const cx = (landmarks[0].x + landmarks[9].x) / 2;
            const cy = (landmarks[0].y + landmarks[9].y) / 2;

            // 手势去抖
            if (gesture !== gestureName) {
                gestureName = gesture;
                gestureStartTime = now;
            }
            const held = now - gestureStartTime >= GESTURE_DEBOUNCE;

            if (eeState === 'NORMAL') {
                // 手掌 → 旋转视角
                if (gesture === 'palm' && lastHandCenter) {
                    const dx = cx - lastHandCenter.x;
                    const dy = cy - lastHandCenter.y;
                    // MediaPipe 坐标 0-1 ，映射到旋转（镜像后 dx 要反向）
                    spherical.theta += dx * 3.0;
                    spherical.phi += dy * 2.0;
                    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                    updateCameraFromSpherical();
                }
                // 握拳 → 毁灭
                if (gesture === 'fist' && held) {
                    startDestroy();
                }
                eeStatus.textContent = gesture === 'palm' ? 'TRACKING' :
                                        gesture === 'fist' ? 'FIST...' : 'HAND TRACKING';
            } else if (eeState === 'DEAD') {
                // 伸食指 → 重生
                if (gesture === 'point' && held) {
                    startRebirth();
                }
                eeStatus.textContent = gesture === 'point' ? 'REBIRTH...' : 'DEAD - POINT TO REVIVE';
            } else if (eeState === 'DESTROYING') {
                eeStatus.textContent = 'DESTROYING...';
            } else if (eeState === 'REBIRTHING') {
                eeStatus.textContent = 'REBIRTHING...';
            }

            lastHandCenter = { x: cx, y: cy };
        }

        // --- 粒子系统管理 ---
        function createParticleExplosion(origin, count, colorArr, speed, lifetime) {
            const positions = new Float32Array(count * 3);
            const velocities = [];
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                positions[i * 3] = origin.x;
                positions[i * 3 + 1] = origin.y;
                positions[i * 3 + 2] = origin.z;

                // 随机方向
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const v = speed * (0.5 + Math.random());
                velocities.push(
                    v * Math.sin(phi) * Math.cos(theta),
                    v * Math.sin(phi) * Math.sin(theta),
                    v * Math.cos(phi)
                );

                const c = colorArr[Math.floor(Math.random() * colorArr.length)];
                colors[i * 3] = ((c >> 16) & 0xff) / 255;
                colors[i * 3 + 1] = ((c >> 8) & 0xff) / 255;
                colors[i * 3 + 2] = (c & 0xff) / 255;

                sizes[i] = 0.5 + Math.random() * 1.5;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.PointsMaterial({
                size: 1.0,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);

            const ps = {
                type: 'explosion',
                points, velocities, lifetime, elapsed: 0, count
            };
            particleSystems.push(ps);
            return ps;
        }

        function createParticleConverge(target, count, radius, colorArr, lifetime) {
            const positions = new Float32Array(count * 3);
            const startPositions = [];
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = radius * (0.5 + Math.random());
                const sx = target.x + r * Math.sin(phi) * Math.cos(theta);
                const sy = target.y + r * Math.sin(phi) * Math.sin(theta);
                const sz = target.z + r * Math.cos(phi);

                positions[i * 3] = sx;
                positions[i * 3 + 1] = sy;
                positions[i * 3 + 2] = sz;
                startPositions.push(sx, sy, sz);

                const c = colorArr[Math.floor(Math.random() * colorArr.length)];
                colors[i * 3] = ((c >> 16) & 0xff) / 255;
                colors[i * 3 + 1] = ((c >> 8) & 0xff) / 255;
                colors[i * 3 + 2] = (c & 0xff) / 255;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);

            const ps = {
                type: 'converge',
                points, startPositions, target, lifetime, elapsed: 0, count
            };
            particleSystems.push(ps);
            return ps;
        }

        function updateParticleSystems(dt) {
            for (let i = particleSystems.length - 1; i >= 0; i--) {
                const ps = particleSystems[i];
                ps.elapsed += dt;
                const t = Math.min(ps.elapsed / ps.lifetime, 1);

                const posAttr = ps.points.geometry.attributes.position;

                if (ps.type === 'explosion') {
                    for (let j = 0; j < ps.count; j++) {
                        posAttr.array[j * 3] += ps.velocities[j * 3] * dt;
                        posAttr.array[j * 3 + 1] += ps.velocities[j * 3 + 1] * dt;
                        posAttr.array[j * 3 + 2] += ps.velocities[j * 3 + 2] * dt;
                    }
                    ps.points.material.opacity = 1 - t;
                } else if (ps.type === 'converge') {
                    const eased = 1 - Math.pow(1 - t, 2); // easeOut
                    for (let j = 0; j < ps.count; j++) {
                        posAttr.array[j * 3] = ps.startPositions[j * 3] + (ps.target.x - ps.startPositions[j * 3]) * eased;
                        posAttr.array[j * 3 + 1] = ps.startPositions[j * 3 + 1] + (ps.target.y - ps.startPositions[j * 3 + 1]) * eased;
                        posAttr.array[j * 3 + 2] = ps.startPositions[j * 3 + 2] + (ps.target.z - ps.startPositions[j * 3 + 2]) * eased;
                    }
                    ps.points.material.opacity = Math.min(t * 2, 1);
                }

                posAttr.needsUpdate = true;

                if (t >= 1) {
                    scene.remove(ps.points);
                    ps.points.geometry.dispose();
                    ps.points.material.dispose();
                    particleSystems.splice(i, 1);
                }
            }
        }

        // --- 毁灭动画 ---
        // 行星按距离排序（用于冲击波摧毁顺序）
        const planetsByDistance = PLANETS_DATA.map((d, i) => ({
            index: i,
            distance: d.distance * AU_SCALE,
            name: d.name
        })).sort((a, b) => a.distance - b.distance);

        const destroyedPlanets = new Set();

        function startDestroy() {
            eeState = 'DESTROYING';
            destroyTimer = 0;
            destroyedPlanets.clear();
            savedTimeScale = timeScale;
            timeScale = 0;
            focusTarget = null;
            needsZoom = false;
        }

        // 创建尘埃冲击带（替代 RingGeometry 冲击波）
        function createDustBelt(origin) {
            const count = 1200;
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const lifetimes = new Float32Array(count); // 每粒子独立寿命

            const colorPalette = [
                [1.0, 0.53, 0.0],    // 橙
                [1.0, 0.8, 0.0],     // 金黄
                [1.0, 0.27, 0.0],    // 红橙
                [1.0, 1.0, 1.0],     // 白
                [0.8, 0.4, 0.1],     // 暗橙
                [0.3, 0.4, 0.8],     // 蓝（外层渐变）
            ];

            for (let i = 0; i < count; i++) {
                // 初始位置：在太阳附近随机分布
                const theta = Math.random() * Math.PI * 2;
                const phi = -0.3 + Math.random() * 0.6; // 偏平面分布（±~17度）
                const r = 2 + Math.random() * 5;

                positions[i * 3] = origin.x + r * Math.cos(theta) * Math.cos(phi);
                positions[i * 3 + 1] = origin.y + r * Math.sin(phi);
                positions[i * 3 + 2] = origin.z + r * Math.sin(theta) * Math.cos(phi);

                // 径向速度：50-200，有随机散布
                const speed = 50 + Math.random() * 150;
                const scatter = (Math.random() - 0.5) * 0.3;
                velocities[i * 3] = Math.cos(theta) * Math.cos(phi + scatter) * speed;
                velocities[i * 3 + 1] = Math.sin(phi + scatter) * speed * 0.3;
                velocities[i * 3 + 2] = Math.sin(theta) * Math.cos(phi + scatter) * speed;

                // 颜色：内层偏橙白，外层偏蓝
                const ci = Math.floor(Math.random() * colorPalette.length);
                colors[i * 3] = colorPalette[ci][0];
                colors[i * 3 + 1] = colorPalette[ci][1];
                colors[i * 3 + 2] = colorPalette[ci][2];

                // 每粒子的独立寿命 3-6 秒
                lifetimes[i] = 3.0 + Math.random() * 3.0;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);

            dustBelt = {
                points, velocities, lifetimes, count,
                elapsed: 0, origin: origin.clone()
            };
        }

        // 计算尘埃带前沿距离（取最远 5% 粒子的平均距离）
        function getDustBeltFrontRadius() {
            if (!dustBelt) return 0;
            const posArr = dustBelt.points.geometry.attributes.position.array;
            const ox = dustBelt.origin.x, oy = dustBelt.origin.y, oz = dustBelt.origin.z;
            const distances = [];
            for (let i = 0; i < dustBelt.count; i++) {
                const dx = posArr[i * 3] - ox;
                const dy = posArr[i * 3 + 1] - oy;
                const dz = posArr[i * 3 + 2] - oz;
                distances.push(Math.sqrt(dx * dx + dy * dy + dz * dz));
            }
            distances.sort((a, b) => b - a);
            const top5 = Math.max(1, Math.floor(distances.length * 0.05));
            let sum = 0;
            for (let i = 0; i < top5; i++) sum += distances[i];
            return sum / top5;
        }

        function updateDustBelt(dt) {
            if (!dustBelt) return;
            dustBelt.elapsed += dt;
            const posArr = dustBelt.points.geometry.attributes.position.array;
            const colArr = dustBelt.points.geometry.attributes.color.array;

            for (let i = 0; i < dustBelt.count; i++) {
                const life = dustBelt.lifetimes[i];
                const age = dustBelt.elapsed;
                if (age > life) {
                    // 粒子淡出后定格
                    continue;
                }

                // 速度随时间衰减
                const decay = Math.max(0, 1 - age / life * 0.5);
                posArr[i * 3] += dustBelt.velocities[i * 3] * dt * decay;
                posArr[i * 3 + 1] += dustBelt.velocities[i * 3 + 1] * dt * decay;
                posArr[i * 3 + 2] += dustBelt.velocities[i * 3 + 2] * dt * decay;

                // 颜色渐变：远处偏蓝（基于距离中心的比例）
                const dx = posArr[i * 3] - dustBelt.origin.x;
                const dz = posArr[i * 3 + 2] - dustBelt.origin.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                const maxDist = 35 * AU_SCALE;
                const blueMix = Math.min(1, dist / maxDist);
                // 原始颜色向蓝色渐变
                colArr[i * 3] = colArr[i * 3] * (1 - blueMix * 0.6);
                colArr[i * 3 + 2] = Math.min(1, colArr[i * 3 + 2] + blueMix * 0.3);
            }

            // 整体透明度随时间淡出
            const overallFade = Math.max(0, 1 - dustBelt.elapsed / 5.0);
            dustBelt.points.material.opacity = 0.9 * overallFade;

            dustBelt.points.geometry.attributes.position.needsUpdate = true;
            dustBelt.points.geometry.attributes.color.needsUpdate = true;
        }

        function updateDestroyAnimation(dt) {
            destroyTimer += dt;
            const t = destroyTimer;

            // 0-1s: 太阳坍缩
            if (t < 1.0) {
                const s = 1.0 - (t / 1.0) * 0.98;
                sun.scale.set(s, s, s);
                glowMat.opacity = 1.0 - t;
            }

            // 1s: 太阳隐藏 + 太阳爆炸粒子 + 尘埃冲击带
            if (t >= 1.0 && sun.visible) {
                sun.visible = false;
                sunGlow.visible = false;
                const sunPos = new THREE.Vector3();
                sun.getWorldPosition(sunPos);
                createParticleExplosion(
                    sunPos, 800,
                    [0xFF8800, 0xFFCC00, 0xFFFFFF, 0xFF4400],
                    80, 3.5
                );
                createDustBelt(sunPos);
            }

            // 1-5s: 尘埃带扩散 + 前沿摧毁行星
            if (t >= 1.0) {
                updateDustBelt(dt);
                const frontR = getDustBeltFrontRadius();

                planetsByDistance.forEach(pd => {
                    if (!destroyedPlanets.has(pd.index) && frontR >= pd.distance) {
                        destroyedPlanets.add(pd.index);
                        const group = planetMeshes[pd.index];
                        const u = group.userData;
                        const wp = new THREE.Vector3();
                        u.mesh.getWorldPosition(wp);

                        u.mesh.visible = false;
                        if (u.moonGroup) {
                            u.moonGroup.userData.mesh.visible = false;
                        }

                        createParticleExplosion(
                            wp, 200,
                            [0xFF6600, 0xFFAA00, 0xFFFFFF, 0xFF2200],
                            30, 2.0
                        );
                    }
                });
            }

            // 4-5s: 星空微暗营造氛围（降到 70% 亮度）
            if (t >= 4.0 && t < 5.0) {
                const fadeProgress = (t - 4.0) / 1.0;
                const normalBrightness = THREE.MathUtils.clamp((spherical.radius - 50) / 300, 0.15, 1.0);
                skyMat.color.setScalar(normalBrightness * (1 - fadeProgress * 0.3));
                orbitLines.forEach(l => l.visible = false);
                allLabels.forEach(l => l.visible = false);
            }

            // 5s: 清理尘埃带，进入 DEAD
            if (t >= 5.0) {
                if (dustBelt) {
                    scene.remove(dustBelt.points);
                    dustBelt.points.geometry.dispose();
                    dustBelt.points.material.dispose();
                    dustBelt = null;
                }
                const normalBrightness = THREE.MathUtils.clamp((spherical.radius - 50) / 300, 0.15, 1.0);
                skyMat.color.setScalar(normalBrightness * 0.7);
                eeState = 'DEAD';
                eeStatus.textContent = 'DEAD - POINT TO REVIVE';
            }
        }

        // --- 重生动画（引力聚合） ---
        const rebirthPlanetTimers = [];

        // 创建引力模拟粒子系统
        function createGravitySystem(target, count, spawnRadius, colorArr, centerMass) {
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                // 随机球壳位置
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = spawnRadius * (0.4 + Math.random() * 0.6);

                const px = target.x + r * Math.sin(phi) * Math.cos(theta);
                const py = target.y + r * Math.sin(phi) * Math.sin(theta);
                const pz = target.z + r * Math.cos(phi);
                positions[i * 3] = px;
                positions[i * 3 + 1] = py;
                positions[i * 3 + 2] = pz;

                // 初始切向速度（产生旋转） + 小量随机径向速度
                const toCenter = new THREE.Vector3(target.x - px, target.y - py, target.z - pz).normalize();
                // 切向 = toCenter × 随机上方向
                const up = new THREE.Vector3(0, 1, 0);
                const tangent = new THREE.Vector3().crossVectors(toCenter, up).normalize();
                // 如果 toCenter 近似平行于 up，换一个参考方向
                if (tangent.length() < 0.1) {
                    tangent.crossVectors(toCenter, new THREE.Vector3(1, 0, 0)).normalize();
                }

                const tangentSpeed = (8 + Math.random() * 15) * (Math.random() > 0.5 ? 1 : -0.3);
                const radialSpeed = -2 - Math.random() * 5; // 轻微向内

                velocities[i * 3] = tangent.x * tangentSpeed + toCenter.x * radialSpeed;
                velocities[i * 3 + 1] = tangent.y * tangentSpeed + toCenter.y * radialSpeed + (Math.random() - 0.5) * 3;
                velocities[i * 3 + 2] = tangent.z * tangentSpeed + toCenter.z * radialSpeed;

                const c = colorArr[Math.floor(Math.random() * colorArr.length)];
                colors[i * 3] = ((c >> 16) & 0xff) / 255;
                colors[i * 3 + 1] = ((c >> 8) & 0xff) / 255;
                colors[i * 3 + 2] = (c & 0xff) / 255;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.6,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);

            const gs = {
                points, velocities, count,
                target: target.clone(),
                centerMass, // 引力强度
                elapsed: 0,
                lifetime: 3.0,
                collapsed: false // 是否已收缩完成
            };
            gravitySystems.push(gs);
            return gs;
        }

        function updateGravitySystems(dt) {
            for (let i = gravitySystems.length - 1; i >= 0; i--) {
                const gs = gravitySystems[i];
                gs.elapsed += dt;
                const t = Math.min(gs.elapsed / gs.lifetime, 1);

                const posArr = gs.points.geometry.attributes.position.array;
                const velArr = gs.velocities;
                const tx = gs.target.x, ty = gs.target.y, tz = gs.target.z;

                let allClose = true;

                for (let j = 0; j < gs.count; j++) {
                    const j3 = j * 3;
                    const dx = tx - posArr[j3];
                    const dy = ty - posArr[j3 + 1];
                    const dz = tz - posArr[j3 + 2];
                    const distSq = dx * dx + dy * dy + dz * dz;
                    const dist = Math.sqrt(distSq);

                    if (dist > 1.0) allClose = false;

                    // 引力加速度 F = G*M / r^2，限制最大加速度防止爆炸
                    const gravStrength = gs.centerMass / Math.max(distSq, 4);
                    const accel = Math.min(gravStrength, 80);

                    if (dist > 0.5) {
                        velArr[j3] += (dx / dist) * accel * dt;
                        velArr[j3 + 1] += (dy / dist) * accel * dt;
                        velArr[j3 + 2] += (dz / dist) * accel * dt;
                    }

                    // 阻尼让粒子逐渐减速收缩（随时间增强）
                    const damping = 1 - (0.3 + t * 1.5) * dt;
                    velArr[j3] *= damping;
                    velArr[j3 + 1] *= damping;
                    velArr[j3 + 2] *= damping;

                    posArr[j3] += velArr[j3] * dt;
                    posArr[j3 + 1] += velArr[j3 + 1] * dt;
                    posArr[j3 + 2] += velArr[j3 + 2] * dt;
                }

                gs.points.geometry.attributes.position.needsUpdate = true;

                // 透明度：先淡入再淡出收缩
                if (t < 0.1) {
                    gs.points.material.opacity = t / 0.1 * 0.8;
                } else if (t > 0.85) {
                    gs.points.material.opacity = (1 - t) / 0.15 * 0.8;
                }

                // 粒子尺寸随收缩变小
                gs.points.material.size = 0.6 * (1 - t * 0.5);

                if (t >= 0.9) gs.collapsed = true;

                if (t >= 1) {
                    scene.remove(gs.points);
                    gs.points.geometry.dispose();
                    gs.points.material.dispose();
                    gravitySystems.splice(i, 1);
                }
            }
        }

        function startRebirth() {
            eeState = 'REBIRTHING';
            rebirthTimer = 0;
            rebirthPlanetTimers.length = 0;

            // 行星重生计时器
            planetsByDistance.forEach((pd, idx) => {
                rebirthPlanetTimers.push({
                    index: pd.index,
                    triggerTime: 2.0 + idx * 0.35,
                    spawned: false,
                    gsRef: null, // 引力系统引用
                    planetRevealed: false
                });
            });

            // 太阳引力聚合
            const sunPos = new THREE.Vector3();
            sun.getWorldPosition(sunPos);
            createGravitySystem(
                sunPos, 500, 200,
                [0xFFCC00, 0xFF8800, 0xFFFFFF, 0xFF4400],
                800 // 太阳引力更强
            );
        }

        function updateRebirthAnimation(dt) {
            rebirthTimer += dt;
            const t = rebirthTimer;

            // 更新所有引力系统
            updateGravitySystems(dt);

            // 1.5s: 太阳开始显现（引力系统收缩到一定程度时）
            if (t >= 1.5 && !sun.visible) {
                sun.visible = true;
                sunGlow.visible = true;
                sun.scale.set(0.01, 0.01, 0.01);
                glowMat.opacity = 0;
            }

            // 1.5-2.5s: 太阳从尘埃核心膨胀点燃
            if (t >= 1.5 && t < 2.5) {
                const p = (t - 1.5) / 1.0;
                const eased = 1 - Math.pow(1 - p, 3);
                const s = 0.01 + 0.99 * eased;
                sun.scale.set(s, s, s);
                glowMat.opacity = eased;
            }
            if (t >= 2.5) {
                sun.scale.set(1, 1, 1);
                glowMat.opacity = 1;
            }

            // 2.0+: 行星依次引力聚合
            rebirthPlanetTimers.forEach(rp => {
                if (!rp.spawned && t >= rp.triggerTime) {
                    rp.spawned = true;
                    const group = planetMeshes[rp.index];
                    const u = group.userData;

                    const wp = new THREE.Vector3();
                    u.mesh.getWorldPosition(wp);

                    // 创建引力聚合粒子
                    rp.gsRef = createGravitySystem(
                        wp, 200, 60,
                        [0xFFCC00, 0xAADDFF, 0xFFFFFF, 0xFF8800],
                        300
                    );
                }

                // 粒子收缩过半时显现行星
                if (rp.spawned && !rp.planetRevealed) {
                    const gs = rp.gsRef;
                    if (gs && (gs.collapsed || gs.elapsed > gs.lifetime * 0.6)) {
                        rp.planetRevealed = true;
                        const group = planetMeshes[rp.index];
                        const u = group.userData;
                        u.mesh.visible = true;
                        u.mesh.scale.set(0.01, 0.01, 0.01);
                        if (u.moonGroup) {
                            u.moonGroup.userData.mesh.visible = true;
                            u.moonGroup.userData.mesh.scale.set(0.01, 0.01, 0.01);
                        }
                    }
                }

                // 行星从尘埃核心膨胀
                if (rp.planetRevealed) {
                    const group = planetMeshes[rp.index];
                    const u = group.userData;
                    const gs = rp.gsRef;
                    if (gs) {
                        const gp = Math.min(gs.elapsed / gs.lifetime, 1);
                        const revealP = Math.min(1, (gp - 0.6) / 0.35);
                        if (revealP < 1) {
                            const eased = 1 - Math.pow(1 - revealP, 2);
                            const s = 0.01 + 0.99 * eased;
                            u.mesh.scale.set(s, s, s);
                            if (u.moonGroup) {
                                u.moonGroup.userData.mesh.scale.set(s, s, s);
                            }
                        } else {
                            u.mesh.scale.set(1, 1, 1);
                            if (u.moonGroup) {
                                u.moonGroup.userData.mesh.scale.set(1, 1, 1);
                            }
                        }
                    }
                }
            });

            // 4.0-4.5s: 星空淡入
            if (t >= 4.0 && t < 4.5) {
                const fadeIn = (t - 4.0) / 0.5;
                const skyBrightness = THREE.MathUtils.clamp((spherical.radius - 50) / 300, 0.15, 1.0);
                skyMat.color.setScalar(fadeIn * skyBrightness);
            }

            // 4.5s: 恢复轨道线和标签
            if (t >= 4.5) {
                orbitLines.forEach(l => l.visible = uiVisible);
                allLabels.forEach(l => l.visible = uiVisible);
            }

            // 5.5s: 完全恢复
            if (t >= 5.5) {
                planetMeshes.forEach(group => {
                    const u = group.userData;
                    u.mesh.scale.set(1, 1, 1);
                    u.mesh.visible = true;
                    if (u.moonGroup) {
                        u.moonGroup.userData.mesh.scale.set(1, 1, 1);
                        u.moonGroup.userData.mesh.visible = true;
                    }
                });

                const skyBrightness = THREE.MathUtils.clamp((spherical.radius - 50) / 300, 0.15, 1.0);
                skyMat.color.setScalar(skyBrightness);

                timeScale = savedTimeScale;
                eeState = 'NORMAL';
                eeStatus.textContent = 'HAND TRACKING';
            }
        }

        animate();

        // --- 窗口 resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
